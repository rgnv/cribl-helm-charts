# OpenShift-specific values for Cribl Stream Worker Group
# Usage: helm install cribl-workers helm-chart-sources/logstream-workergroup -f openshift-values.yaml

# ========================================
# OpenShift Security Context Configuration
# ========================================
# These settings are compatible with the default "restricted" SCC
# No custom SCC required!

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ========================================
# CRIBL_VOLUME_DIR - Writable Configuration
# ========================================
# CRIBL_VOLUME_DIR redirects Cribl's state/config to a writable location
# This is REQUIRED for OpenShift non-root deployments

config:
  criblHome: /tmp/cribl    # Use writable location (emptyDir or PVC)
  host: cribl-leader-internal  # Leader service name (update if different)
  port: 4200              # Leader internal port
  group: kubernetes        # Worker group name
  token: your-secure-token  # MUST match leader's config.token
  useExistingSecret: false
  rejectSelfSignedCerts: 0
  probes: true

# ========================================
# Service Configuration
# ========================================
# Use ClusterIP instead of LoadBalancer (OpenShift restriction)
service:
  enable: true
  type: ClusterIP   # Use ClusterIP with Route/Ingress for external access
  annotations: {}

  # Ports for various data sources
  ports:
  - name: tcpjson
    port: 10001
    protocol: TCP
  - name: s2s
    port: 9997
    protocol: TCP
  - name: http
    port: 10080
    protocol: TCP
  - name: https
    port: 10081
    protocol: TCP
  - name: syslog
    port: 5140
    protocol: TCP
  - name: metrics
    port: 8125
    protocol: TCP
  - name: elastic
    port: 9200
    protocol: TCP
  - name: hec
    port: 8088
    protocol: TCP
  - name: criblhttp
    port: 10200
    protocol: TCP
  - name: cribltcp
    port: 10300
    protocol: TCP

# ========================================
# ServiceAccount for SCC Binding
# ========================================
serviceAccount:
  create: true
  # name: cribl-workers-sa  # Uncomment to set specific name

# ========================================
# RBAC Configuration
# ========================================
rbac:
  create: true
  apiGroups:
  - core
  resources:
  - pods
  verbs:
  - get
  - list

# ========================================
# Persistence Options (Choose ONE)
# ========================================

# Option 1: No persistence (ephemeral, for testing)
# Workers typically don't need persistence

# Option 2: Use extraVolumeMounts with emptyDir (ephemeral)
extraVolumeMounts:
  - name: config-volume
    emptyDir: {}
    mountPath: /tmp/cribl/config-volume

# Option 3: Use extraVolumeMounts with custom PVC
# extraVolumeMounts:
#   - name: config-volume
#     persistentVolumeClaim:
#       claimName: cribl-workers-pvc
#     mountPath: /tmp/cribl/config-volume

# ========================================
# Resource Limits (Adjust for your cluster)
# ========================================
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 256Mi

# ========================================
# Deployment Strategy
# ========================================
# Workers connect to leader, so Deployment is preferred for flexibility
deployment: deployment

# For persistent queueing with StatefulSet:
# deployment: statefulset
# statefulset:
#   persistentVolumeClaimRetentionPolicy:
#     whenDeleted: Delete
#     whenScaled: Retain

# ========================================
# Autoscaling (Optional)
# ========================================
# OpenShift supports HorizontalPodAutoscaler
# Adjust based on your cluster resources
autoscaling:
  enabled: false  # Disable for resource-constrained clusters
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

# ========================================
# Ingress Configuration (Alternative to Route)
# ========================================
# OpenShift supports both Route and Ingress
# Use Ingress for portability across Kubernetes distributions

ingress:
  enabled: false  # Enable if you need external access
  className: ""   # OpenShift default Ingress controller
  annotations:
    route.openshift.io/termination: "edge"
  hosts:
    - host: cribl-workers.apps-crc.testing
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: cribl-workers-tls
    #   hosts:
    #     - cribl-workers.apps-crc.testing

# ========================================
# Complete Deployment Commands
# ========================================
# 1. Create namespace (or use existing):
#    oc new-project cribl-test
#
# 2. Deploy leader first (with config.token set):
#    helm install cribl-leader helm-chart-sources/logstream-leader \
#      --set config.token=your-secure-token \
#      -f helm-chart-sources/logstream-leader/examples/openshift-values.yaml \
#      -n cribl-test
#
# 3. Deploy workers with matching token:
#    helm install cribl-workers helm-chart-sources/logstream-workergroup \
#      --set config.token=your-secure-token \
#      -f examples/openshift-values.yaml \
#      -n cribl-test
#
# 4. Verify deployment:
#    oc get pods -n cribl-test
#    oc logs <worker-pod> -n cribl-test
#
# 5. Check worker connection to leader:
#    oc exec <worker-pod> -- curl -s http://cribl-leader-internal:4200/api/v1/health

# ========================================
# Troubleshooting
# ========================================
# If you encounter "permission denied" errors:
# - Verify CRIBL_VOLUME_DIR is set: oc exec <pod> -- env | grep CRIBL_VOLUME_DIR
# - Check pod SCC: oc get pod <pod> -o jsonpath='{.metadata.annotations.openshift\.io/scc}'
# - Ensure config.criblHome is set to a writable location
#
# If workers fail to connect to leader:
# - Verify leader is running: oc get pods -n cribl-test
# - Check leader service: oc get svc cribl-leader-internal -n cribl-test
# - Test connection: oc exec <worker-pod> -- curl http://cribl-leader-internal:4200/api/v1/health
# - Verify config.token matches leader token
# - Ensure leader has config.token set (required for distributed mode)
#
# If you encounter "LoadBalancer type forbidden":
# - Use ClusterIP (as shown above) and create Ingress/Route
#
# For more troubleshooting, see: docs/openshift-troubleshooting.md
