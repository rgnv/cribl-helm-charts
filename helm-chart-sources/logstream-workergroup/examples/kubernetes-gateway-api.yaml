#     - backendRefs:
#         - name: cribl-workers
#           port: 10081

# ========================================
# Troubleshooting
# ========================================
# If Gateway is not working:
#
# 1. Check Gateway status:
#    kubectl describe gateway cribl-workers-gateway -n cribl
#
# 2. Check TCPRoute status:
#    kubectl describe tcproute cribl-workers-tcpjson -n cribl
#
# 3. Check HTTPRoute status:
#    kubectl describe httproute cribl-workers-http -n cribl
#
# 4. Check Gateway controller logs:
#    kubectl logs -n envoy-gateway-system -l app=envoy-gateway
#
# 5. Test TCP connectivity:
#    nc -vz <Gateway-IP> 10001
#    echo "test" | nc <Gateway-IP> 10001
#
# 6. Test HTTP connectivity:
#    curl -v http://cribl-workers.example.com/
#
# 7. Check worker service endpoints:
#    kubectl get endpoints cribl-workers -n cribl
#    kubectl get pods -l app=cribl-workers -n cribl

# ========================================
# Gateway Controller Comparison
# ========================================
# Envoy Gateway (Recommended):
# - Native Gateway API implementation
# - Supports TCPRoute, HTTPRoute
# - Good documentation
# - Active community
#
# Istio:
# - Mature Gateway API support
# - Additional service mesh features
# - Good for microservices
#
# Contour:
# - Lightweight ingress controller
# - Gateway API support via Contour
#
# NGINX Gateway:
# - NGINX-based Gateway controller
# - Mature, stable

# ========================================
# Port Allocation Guide
# ========================================
# When using Gateway API with multiple worker groups:
#
# Recommended port allocation:
# - Gateway listeners: 80, 443, 10001-11000
# - Worker Group 1: 10001-10050 (TCP JSON, S2S, HTTP, etc.)
# - Worker Group 2: 10101-10150
# - Worker Group 3: 10201-10250
#
# Document port allocations in your infrastructure
# Use Kubernetes ServiceMonitor for monitoring

# ========================================
# Advanced: Gateway API with Service Mesh
# ========================================
# For enhanced traffic control, combine Gateway API with Service Mesh:
#
# Istio example:
# - Deploy Istio with Gateway API integration
# - Use VirtualService for traffic splitting
# - Use DestinationRule for load balancing
# - Enable mTLS for security
#
# This provides:
# - Traffic mirroring
# - Circuit breaking
# - Retry policies
# - Load balancing algorithms
# - Traffic shifting (canary, blue-green)