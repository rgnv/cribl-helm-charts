{{- if or .Values.podSecurityContext .Values.securityContext }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.fullname" . }}-gitconfig
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  .gitconfig: |
    [safe]
    directory = {{ .Values.config.criblHome }}/config-volume
{{- end }}